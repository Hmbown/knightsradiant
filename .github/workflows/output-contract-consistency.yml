name: Output Contract Consistency

on:
  push:
  pull_request:

jobs:
  verify-output-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify output contracts
        run: python3 scripts/verify_output_contracts.py
